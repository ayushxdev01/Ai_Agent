<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
    --bg-deep:#05070a;
    --bg-panel:#0c1310;
    --bg-elevated:#121b16;
    --border:#1e2b23;
    --border-soft:#141d18;
    --ice:#3dffc0;
    --ice-dim:#22b88c;
    --ice-glow: rgba(61,255,192,0.22);
    --violet:#c6ff3d;
    --violet-glow: rgba(198,255,61,0.16);
    --text-primary:#eef1f8;
    --text-muted:#8993ac;
    --text-faint:#485065;
    --danger:#e0777a;
    --good:#5fd98a;
    --sidebar-w:250px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }

body{
    background:
    radial-gradient(ellipse 500px 380px at 30% 0%, rgba(255,255,255,0.10), transparent 60%),
    radial-gradient(ellipse 1100px 700px at 12% -8%, rgba(61,255,192,0.26), transparent 58%),
    radial-gradient(ellipse 900px 600px at 102% 6%, rgba(198,255,61,0.20), transparent 58%),
    radial-gradient(ellipse 800px 600px at 55% 108%, rgba(34,184,140,0.18), transparent 62%),
    radial-gradient(ellipse 600px 500px at 40% 45%, rgba(198,255,61,0.06), transparent 65%),
    linear-gradient(160deg, #081310 0%, #050a08 42%, #05070a 100%);
    background-attachment:fixed;
    color:var(--text-primary);
    font-family:'Inter', sans-serif;
    display:flex;
    height:100vh;
    overflow:hidden;
    position:relative;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:radial-gradient(circle, rgba(61,255,192,0.06) 1px, transparent 1px);
    background-size:26px 26px;
    pointer-events:none;
    mask-image:radial-gradient(ellipse 900px 500px at 50% 0%, black, transparent 70%);
    z-index:0;
}

.shine-sweep{
    position:fixed;
    inset:-20% -60% -20% -60%;
    pointer-events:none;
    z-index:0;
    background:linear-gradient(115deg,
        transparent 30%,
        rgba(255,255,255,0.05) 45%,
        rgba(255,255,255,0.14) 50%,
        rgba(255,255,255,0.05) 55%,
        transparent 70%);
    background-size:250% 250%;
    background-position:0% 0%;
    animation:shine-move 9s ease-in-out infinite;
    mix-blend-mode:screen;
}
@keyframes shine-move{
    0%{ background-position:15% 0%; }
    50%{ background-position:85% 100%; }
    100%{ background-position:15% 0%; }
}

.core{ position:relative; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.core svg{ display:block; }
.core .ring{ fill:none; stroke:var(--ice); stroke-opacity:0.35; }
.core .ring-outer{ animation:spin 14s linear infinite; transform-origin:center; }
.core .ring-inner{ stroke:var(--violet); stroke-opacity:0.4; animation:spin-rev 9s linear infinite; transform-origin:center; }
.core .nucleus{ fill:var(--ice); filter:drop-shadow(0 0 6px var(--ice-glow)); animation:pulse-core 2.6s ease-in-out infinite; }

@keyframes spin{ to{ transform:rotate(360deg); } }
@keyframes spin-rev{ to{ transform:rotate(-360deg); } }
@keyframes pulse-core{ 0%,100%{ r:3.6; opacity:1; } 50%{ r:4.6; opacity:0.75; } }

.sidebar{
    width:var(--sidebar-w);
    flex-shrink:0;
    background:
        radial-gradient(ellipse 300px 260px at 15% 0%, rgba(61,255,192,0.10), transparent 60%),
        radial-gradient(ellipse 260px 300px at 100% 60%, rgba(198,255,61,0.07), transparent 65%),
        radial-gradient(ellipse 240px 200px at 0% 100%, rgba(255,255,255,0.04), transparent 60%),
        linear-gradient(180deg, #0e1815 0%, #0a120e 55%, #0c1310 100%);
    border-right:1px solid var(--border-soft);
    display:flex;
    flex-direction:column;
    position:relative;
    z-index:2;
    transition:margin-left 0.22s ease;
}

.sidebar-header{
    padding:20px 18px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    border-bottom:1px solid var(--border-soft);
}

.sidebar-header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:15.5px;
    font-weight:600;
    letter-spacing:0.2px;
    background:linear-gradient(90deg, var(--text-primary), var(--ice));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}

.sidebar-header .subline{
    font-family:'JetBrains Mono', monospace;
    color:var(--text-faint);
    font-size:10.5px;
    margin-top:2px;
    display:flex; align-items:center; gap:6px;
}
.subline .dot{ width:5px; height:5px; border-radius:50%; background:var(--good); box-shadow:0 0 5px 1px rgba(95,217,138,0.5); animation:blink-dot 2s ease-in-out infinite; }
@keyframes blink-dot{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.tools-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:1.4px;
    text-transform:uppercase;
    color:var(--text-faint);
    padding:18px 18px 8px;
}

.tool-list{ display:flex; flex-direction:column; gap:4px; padding:0 10px; overflow-y:auto; flex:1; }

.tool-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 8px;
    border-radius:9px;
    border:1px solid transparent;
    transition:background 0.15s, border-color 0.15s;
}

.tool-item .icon{
    width:26px; height:26px; flex-shrink:0;
    border-radius:7px;
    background:linear-gradient(145deg, #17221c, #101a15);
    border:1px solid var(--border);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
    display:flex; align-items:center; justify-content:center;
    color:var(--ice-dim);
}
.tool-item .icon svg{ width:14px; height:14px; }

.tool-item .name{ font-size:12.5px; font-weight:500; color:var(--text-muted); }
.tool-item .desc{ font-family:'JetBrains Mono', monospace; font-size:9.5px; color:var(--text-faint); margin-top:1px; }

.tool-item.active{
    background:linear-gradient(135deg, rgba(61,255,192,0.09), rgba(198,255,61,0.06));
    border-color:rgba(61,255,192,0.25);
}
.tool-item.active .icon{ color:var(--ice); border-color:var(--ice-dim); box-shadow:0 0 10px var(--ice-glow); }
.tool-item.active .name{ color:var(--text-primary); }

.sidebar-footer{ padding:14px; border-top:1px solid var(--border-soft); }

.clear-btn{
    width:100%;
    display:flex; align-items:center; justify-content:center; gap:7px;
    padding:9px;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--bg-elevated);
    color:var(--text-muted);
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    cursor:pointer;
    transition:border-color 0.15s, color 0.15s;
}
.clear-btn:hover{ border-color:var(--danger); color:var(--danger); }
.clear-btn svg{ width:13px; height:13px; }

.credit-link{
    display:flex; align-items:center; justify-content:center; gap:7px;
    margin-top:10px;
    padding:8px;
    border-radius:9px;
    text-decoration:none;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-faint);
    border:1px solid transparent;
    transition:color 0.15s, border-color 0.15s, background 0.15s;
}
.credit-link:hover{
    color:var(--ice);
    border-color:rgba(61,255,192,0.25);
    background:rgba(61,255,192,0.06);
}

.sidebar-toggle{
    display:none;
    position:fixed;
    top:16px; left:16px;
    z-index:5;
    width:36px; height:36px;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--bg-panel);
    color:var(--text-muted);
    align-items:center; justify-content:center;
    cursor:pointer;
}

.chat-col{ flex:1; display:flex; flex-direction:column; min-width:0; position:relative; z-index:1; }

header{
    flex-shrink:0;
    padding:20px 28px 16px;
    border-bottom:1px solid var(--border-soft);
}
.header-inner{ max-width:780px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:14px; }
.header-left{ display:flex; align-items:center; gap:12px; }
.header-text h2{ font-family:'Space Grotesk', sans-serif; font-size:16px; font-weight:600; }
.header-text .status{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--text-faint); margin-top:2px; }
.conn-badge{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    padding:4px 9px;
    border-radius:20px;
    border:1px solid var(--border);
    color:var(--text-faint);
    display:flex; align-items:center; gap:5px;
}
.conn-badge .d{ width:5px; height:5px; border-radius:50%; background:var(--text-faint); }
.conn-badge.ok .d{ background:var(--good); box-shadow:0 0 5px 1px rgba(95,217,138,0.5); }
.conn-badge.ok{ color:var(--good); border-color:rgba(95,217,138,0.25); }
.conn-badge.bad .d{ background:var(--danger); }
.conn-badge.bad{ color:var(--danger); border-color:rgba(224,119,122,0.25); }

main{ flex:1; overflow-y:auto; padding:32px 28px 12px; }
.stream{ max-width:780px; margin:0 auto; display:flex; flex-direction:column; gap:22px; }

.empty-hero{ max-width:780px; margin:8vh auto 0; text-align:center; display:flex; flex-direction:column; align-items:center; gap:18px; }
.empty-hero .core-big{ width:76px; height:76px; }
.empty-hero h2{ font-family:'Space Grotesk', sans-serif; font-size:26px; font-weight:600; letter-spacing:-0.2px; }
.empty-hero p{ font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--text-faint); max-width:380px; line-height:1.8; }

.suggestion-chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:420px; }
.chip{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    padding:7px 12px;
    border-radius:20px;
    border:1px solid var(--border);
    background:var(--bg-elevated);
    color:var(--text-muted);
    cursor:pointer;
    transition:border-color 0.15s, color 0.15s;
}
.chip:hover{ border-color:var(--ice-dim); color:var(--ice); }

.msg{ display:flex; gap:12px; align-items:flex-start; animation:rise 0.32s cubic-bezier(.2,.7,.3,1); }
@keyframes rise{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
.msg.user{ flex-direction:row-reverse; }

.avatar{ width:30px; height:30px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:2px; }
.avatar.user{ background:linear-gradient(135deg, #16302a, #0e211c); border:1px solid #22412f; font-family:'Space Grotesk', sans-serif; font-size:12px; font-weight:600; color:var(--ice); }
.avatar.agent .core{ width:30px; height:30px; }

.msg-col{ display:flex; flex-direction:column; gap:5px; max-width:74%; }
.msg.user .msg-col{ align-items:flex-end; }

.msg-tag{ font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:1px; color:var(--text-faint); text-transform:uppercase; display:flex; align-items:center; gap:8px; }

.tool-badge{
    display:inline-flex; align-items:center; gap:4px;
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px;
    padding:2px 8px 2px 6px;
    border-radius:20px;
    background:rgba(61,255,192,0.08);
    border:1px solid rgba(61,255,192,0.25);
    color:var(--ice);
    text-transform:none;
    letter-spacing:0.2px;
}
.tool-badge svg{ width:9px; height:9px; }

.bubble{ font-size:14.5px; line-height:1.65; padding:12px 15px; border-radius:12px; white-space:pre-wrap; word-wrap:break-word; }
.msg.user .bubble{ background:linear-gradient(135deg, rgba(61,255,192,0.14), rgba(198,255,61,0.08)); border:1px solid rgba(61,255,192,0.25); color:var(--text-primary); border-top-right-radius:4px; }
.msg.agent .bubble{ background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-primary); border-top-left-radius:4px; }
.msg.agent .bubble.error{ border-color:rgba(224,119,122,0.4); color:var(--danger); }

.typing-row{ display:flex; gap:12px; align-items:flex-start; }
.typing{ display:flex; gap:4px; padding:14px 16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:12px; border-top-left-radius:4px; width:fit-content; }
.typing span{ width:5px; height:5px; border-radius:50%; background:var(--ice-dim); animation:bounce 1.2s infinite ease-in-out; }
.typing span:nth-child(2){ animation-delay:0.15s; }
.typing span:nth-child(3){ animation-delay:0.3s; }
@keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:0.5; } 30%{ transform:translateY(-4px); opacity:1; } }

footer{ flex-shrink:0; padding:16px 28px 24px; }
.input-row{ max-width:780px; margin:0 auto; display:flex; align-items:center; gap:10px; background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:6px 6px 6px 16px; transition:border-color 0.15s, box-shadow 0.15s; }
.input-row:focus-within{ border-color:var(--ice-dim); box-shadow:0 0 0 3px var(--ice-glow); }
#msg-input{ flex:1; background:transparent; border:none; outline:none; color:var(--text-primary); font-family:'Inter', sans-serif; font-size:14.5px; padding:11px 0; resize:none; max-height:140px; }
#msg-input::placeholder{ color:var(--text-faint); }
#send-btn{ flex-shrink:0; width:38px; height:38px; border-radius:10px; border:none; background:linear-gradient(135deg, var(--ice), var(--violet)); color:#05070a; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform 0.12s, opacity 0.12s; }
#send-btn:hover{ transform:translateY(-1px) scale(1.03); }
#send-btn:disabled{ opacity:0.35; cursor:not-allowed; transform:none; }
.hint{ max-width:780px; margin:9px auto 0; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--text-faint); text-align:right; }

main::-webkit-scrollbar, .tool-list::-webkit-scrollbar{ width:8px; }
main::-webkit-scrollbar-thumb, .tool-list::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
main::-webkit-scrollbar-track, .tool-list::-webkit-scrollbar-track{ background:transparent; }

@media (max-width: 820px){
    .sidebar{ position:fixed; inset:0 auto 0 0; margin-left:calc(-1 * var(--sidebar-w) - 1px); z-index:6; }
    .sidebar.open{ margin-left:0; box-shadow:0 0 40px rgba(0,0,0,0.5); }
    .sidebar-toggle{ display:flex; }
    header{ padding-left:64px; }
}

@media (prefers-reduced-motion: reduce){
    .core .ring-outer, .core .ring-inner, .core .nucleus, .subline .dot, .msg, .shine-sweep{ animation:none !important; }
}
</style>
</head>
<body>
<div class="shine-sweep"></div>

            <span>Ayush Gupta</span>

    </div>
</aside>

<div class="chat-col">
    <header>
        <div class="header-inner">
            <div class="header-left">
                <div class="header-text">
                    <h2>Chat</h2>
                    <div class="status">talk to the agent — it'll pick a tool when it needs one</div>
                </div>
            </div>

                    <svg viewBox="0 0 40 40" width="76" height="76">
                        <circle class="ring ring-outer" cx="20" cy="20" r="16" stroke-width="1" stroke-dasharray="4 5"/>
                        <circle class="ring ring-inner" cx="20" cy="20" r="10.5" stroke-width="1" stroke-dasharray="3 4"/>
                        <circle class="nucleus" cx="20" cy="20" r="3.6"/>

    <footer>
        <div class="input-row">
            <textarea id="msg-input" rows="1" placeholder="Type your message..."></textarea>
            <button id="send-btn" aria-label="Send message">

                    <line x1="22" y1="2" x2="11" y2="13"></line>

</div>

<script>
const stream = document.getElementById('stream');
const emptyHero = document.getElementById('empty-hero');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const main = document.getElementById('main');
const toolList = document.getElementById('tool-list');
const chipsWrap = document.getElementById('chips');
const clearBtn = document.getElementById('clear-btn');
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebar-toggle');
const connBadge = document.getElementById('conn-badge');
const connText = document.getElementById('conn-text');

const coreSVG = `<svg viewBox="0 0 40 40" width="30" height="30">
    <circle class="ring ring-outer" cx="20" cy="20" r="16" stroke-width="1" stroke-dasharray="4 5"/>
    <circle class="ring ring-inner" cx="20" cy="20" r="10.5" stroke-width="1" stroke-dasharray="3 4"/>
    <circle class="nucleus" cx="20" cy="20" r="3.6"/>
    </svg>`;

const TOOL_META = {
    calculator: {
        label: 'Calculator',
        desc: 'arithmetic & math',
        example: 'What is 18% of 2450?',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="8" y1="10" x2="8" y2="10"></line><line x1="12" y1="10" x2="12" y2="10"></line><line x1="16" y1="10" x2="16" y2="10"></line><line x1="8" y1="14" x2="8" y2="14"></line><line x1="12" y1="14" x2="12" y2="14"></line><line x1="16" y1="14" x2="16" y2="14"></line><line x1="8" y1="18" x2="16" y2="18"></line></svg>'
    },
    time: {
        label: 'Time',
        desc: 'current local time',
        example: 'What time is it right now?',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 16 14"></polyline></svg>'
    },
    weather: {
        label: 'Weather',
        desc: 'live city weather',
        example: 'Is it raining in Mumbai?',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 16.2A4.5 4.5 0 0017.5 8h-1.8A7 7 0 104 14.9"></path><path d="M8 19v1"></path><path d="M12 19v2"></path><path d="M16 19v1"></path></svg>'
    },
    currency_converter: {
        label: 'Currency Converter',
        desc: 'live exchange rates',
        example: 'Convert 100 USD to INR',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"></path></svg>'
    },
    wikipedia: {
        label: 'Wikipedia',
        desc: 'quick factual lookups',
        example: 'Who was Alan Turing?',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"></path></svg>'
    },
    unit_converter: {
        label: 'Unit Converter',
        desc: 'convert km, kg, °C, etc.',
        example: 'Convert 10 km to miles',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 014-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 01-4 4H3"></path></svg>'
    },
    _default: {
        label: 'Tool',
        desc: 'general purpose',
        example: null,
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle></svg>'
    }
};

function metaFor(name){ return TOOL_META[name] || { ...TOOL_META._default, label: name }; }

function renderToolList(names){
    toolList.innerHTML = '';
    names.forEach(name => {
        const m = metaFor(name);
        const el = document.createElement('div');
        el.className = 'tool-item';
        el.id = `tool-${name}`;
        el.innerHTML = `
            <div class="icon">${m.icon}</div>
            <div>
                <div class="name">${m.label}</div>
                <div class="desc">${m.desc}</div>
            </div>`;
        toolList.appendChild(el);
    });

    chipsWrap.innerHTML = '';
    names.forEach(name => {
        const m = metaFor(name);
        if(!m.example) return;
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = m.example;
        chip.addEventListener('click', () => { input.value = m.example; sendMessage(); });
        chipsWrap.appendChild(chip);
    });
}

function markToolActive(name){
    document.querySelectorAll('.tool-item.active').forEach(el => el.classList.remove('active'));
    if(!name) return;
    const el = document.getElementById(`tool-${name}`);
    if(el) el.classList.add('active');
    setTimeout(() => { if(el) el.classList.remove('active'); }, 2600);
}

async function loadTools(){
    try{
        const res = await fetch('/api/tools');
        const data = await res.json();
        renderToolList(data.tools || []);
        connBadge.className = 'conn-badge ok';
        connText.textContent = 'server connected';
    }catch(err){
        renderToolList(Object.keys(TOOL_META).filter(k => k !== '_default'));
        connBadge.className = 'conn-badge bad';
        connText.textContent = 'server offline';
    }
}

function scrollBottom(){ main.scrollTop = main.scrollHeight; }

function addMessage(role, text, opts = {}){
    if(emptyHero) emptyHero.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    if(role === 'user'){
        avatar.textContent = 'YOU';
    } else {
        avatar.innerHTML = `<div class="core">${coreSVG}</div>`;
    }

    const col = document.createElement('div');
    col.className = 'msg-col';

    const tag = document.createElement('div');
    tag.className = 'msg-tag';
    let tagHTML = role === 'user' ? 'you' : 'agent';
    if(opts.toolUsed){
        const m = metaFor(opts.toolUsed);
        tagHTML += `<span class="tool-badge">${m.icon.replace('<svg', '<svg width="9" height="9"')} ${m.label}</span>`;
    }
    tag.innerHTML = tagHTML;

    const bubble = document.createElement('div');
    bubble.className = `bubble${opts.isError ? ' error' : ''}`;
    bubble.textContent = text;

    col.appendChild(tag);
    col.appendChild(bubble);
    msg.appendChild(avatar);
    msg.appendChild(col);
    stream.appendChild(msg);
    scrollBottom();
}

function showTyping(){
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';
    row.innerHTML = `
        <div class="avatar agent"><div class="core">${coreSVG}</div></div>
        <div class="typing"><span></span><span></span><span></span></div>
        `;
    stream.appendChild(row);
    scrollBottom();
}

function hideTyping(){
    const el = document.getElementById('typing-indicator');
    if(el) el.remove();
}

async function sendMessage(){
    const text = input.value.trim();
    if(!text) return;

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try{
        const res = await fetch('/api/chat', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        hideTyping();
        addMessage('agent', data.response ?? 'No response received.', { toolUsed: data.tool_used });
        markToolActive(data.tool_used);
    }catch(err){
        hideTyping();
        addMessage('agent', `Could not reach the agent server. Is server.py running? (${err.message})`, { isError: true });
    }finally{
        sendBtn.disabled = false;
        input.focus();
    }
}

async function clearConversation(){
    try{ await fetch('/api/clear', { method: 'POST' }); }catch(err){}
    stream.innerHTML = '';
    const hero = document.createElement('div');
    hero.className = 'empty-hero';
    hero.id = 'empty-hero';
    hero.innerHTML = `
        <div class="core core-big">
            <svg viewBox="0 0 40 40" width="76" height="76">
                <circle class="ring ring-outer" cx="20" cy="20" r="16" stroke-width="1" stroke-dasharray="4 5"/>
                <circle class="ring ring-inner" cx="20" cy="20" r="10.5" stroke-width="1" stroke-dasharray="3 4"/>
                <circle class="nucleus" cx="20" cy="20" r="3.6"/>
            </svg>
        </div>
        <h2>Ready when you are</h2>
        <p>no messages yet — this conversation starts the moment you send one</p>
        <div class="suggestion-chips" id="chips"></div>`;
    stream.appendChild(hero);
    const newChips = hero.querySelector('#chips');
    Object.entries(TOOL_META).forEach(([name, m]) => {
        if(name === '_default' || !m.example) return;
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = m.example;
        chip.addEventListener('click', () => { input.value = m.example; sendMessage(); });
        newChips.appendChild(chip);
    });
}

sendBtn.addEventListener('click', sendMessage);
clearBtn.addEventListener('click', clearConversation);
sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        sendMessage();
    }
});
input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

loadTools();
input.focus();
</script>

</body>
