<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Geneva, sans-serif">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081310"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1815"/>
      <stop offset="55%" stop-color="#0a120e"/>
      <stop offset="100%" stop-color="#0c1310"/>
    </linearGradient>
    <radialGradient id="glow1" cx="10%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#3dffc0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3dffc0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="8%" r="50%">
      <stop offset="0%" stop-color="#c6ff3d" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c6ff3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="55%" cy="105%" r="50%">
      <stop offset="0%" stop-color="#22b88c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22b88c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#3dffc0" fill-opacity="0.08"/>
    </pattern>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="47%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="53%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frameClip">
      <rect x="0" y="0" width="960" height="520" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">

    <!-- base background -->
    <rect x="0" y="0" width="960" height="520" fill="url(#bgGrad)"/>
    <rect x="0" y="0" width="960" height="520" fill="url(#glow1)"/>
    <rect x="0" y="0" width="960" height="520" fill="url(#glow2)"/>
    <rect x="0" y="0" width="960" height="520" fill="url(#glow3)"/>
    <rect x="0" y="0" width="960" height="520" fill="url(#dotGrid)"/>

    <!-- moving shine sweep -->
    <rect x="-500" y="-250" width="600" height="1100" fill="url(#shine)" transform="rotate(25)">
      <animateTransform attributeName="transform" type="translate"
        values="-100,0; 1100,0; -100,0" dur="8s" repeatCount="indefinite" additive="sum"/>
    </rect>

    <rect x="0" y="0" width="960" height="520" fill="none" stroke="#1e2b23" stroke-width="1.5" rx="14"/>

    <!-- ============ SIDEBAR ============ -->
    <rect x="0" y="0" width="230" height="520" fill="url(#sidebarGrad)"/>
    <line x1="230" y1="0" x2="230" y2="520" stroke="#141d18" stroke-width="1"/>

    <!-- sidebar header -->
    <g transform="translate(28,32)">
      <circle r="12" fill="none" stroke="#3dffc0" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 4">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle r="8" fill="none" stroke="#c6ff3d" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 3">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle r="3" fill="#3dffc0">
        <animate attributeName="r" values="2.6;3.6;2.6" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="50" y="28" fill="#eef1f8" font-size="13" font-weight="bold">AI Agent</text>
    <circle cx="53" cy="40" r="3" fill="#5fd98a">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="60" y="43" fill="#485065" font-size="9">session active</text>
    <line x1="0" y1="62" x2="230" y2="62" stroke="#141d18" stroke-width="1"/>

    <text x="16" y="80" fill="#485065" font-size="9" letter-spacing="1">AVAILABLE TOOLS</text>

    <!-- Tool item 1: Calculator -->
    <g transform="translate(0,90)">
      <rect x="14" y="8" width="24" height="24" rx="7" fill="#17221c" stroke="#1e2b23"/>
      <text x="26" y="24" fill="#22b88c" font-size="12" text-anchor="middle" font-weight="bold">+</text>
      <text x="46" y="20" fill="#8993ac" font-size="10.5" font-weight="bold">Calculator</text>
      <text x="46" y="31" fill="#485065" font-size="8">arithmetic &amp; math</text>
    </g>

    <!-- Tool item 2: Crypto Price -->
    <g transform="translate(0,130)">
      <rect x="14" y="8" width="24" height="24" rx="7" fill="#17221c" stroke="#1e2b23"/>
      <text x="26" y="24" fill="#22b88c" font-size="11" text-anchor="middle" font-weight="bold">₿</text>
      <text x="46" y="20" fill="#8993ac" font-size="10.5" font-weight="bold">Crypto Price</text>
      <text x="46" y="31" fill="#485065" font-size="8">live crypto prices</text>
    </g>

    <!-- Tool item 3: Currency Converter (ACTIVE / highlighted during demo) -->
    <g transform="translate(0,170)">
      <rect x="8" y="2" width="214" height="36" rx="9" fill="#1d3d31" stroke="#3dffc0" stroke-opacity="0" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.37;0.42;0.95;1" dur="9s" repeatCount="indefinite"/>
      </rect>
      <rect x="14" y="8" width="24" height="24" rx="7" fill="#17221c" stroke="#1e2b23"/>
      <text x="26" y="24" fill="#3dffc0" font-size="12" text-anchor="middle" font-weight="bold">$</text>
      <text x="46" y="20" fill="#eef1f8" font-size="10.5" font-weight="bold">Currency Converter</text>
      <text x="46" y="31" fill="#485065" font-size="8">live exchange rates</text>
    </g>

    <!-- Tool item 4: Dictionary -->
    <g transform="translate(0,210)">
      <rect x="14" y="8" width="24" height="24" rx="7" fill="#17221c" stroke="#1e2b23"/>
      <text x="26" y="24" fill="#22b88c" font-size="10" text-anchor="middle" font-weight="bold">Aa</text>
      <text x="46" y="20" fill="#8993ac" font-size="10.5" font-weight="bold">Dictionary</text>
      <text x="46" y="31" fill="#485065" font-size="8">word meanings</text>
    </g>

    <!-- Tool item 5: GitHub Info -->
    <g transform="translate(0,250)">
      <rect x="14" y="8" width="24" height="24" rx="7" fill="#17221c" stroke="#1e2b23"/>
      <text x="26" y="24" fill="#22b88c" font-size="9" text-anchor="middle" font-weight="bold">gh</text>
      <text x="46" y="20" fill="#8993ac" font-size="10.5" font-weight="bold">GitHub Info</text>
      <text x="46" y="31" fill="#485065" font-size="8">user &amp; repo lookups</text>
    </g>

    <!-- Tool item 6: QR Code -->
    <g transform="translate(0,290)">
      <rect x="14" y="8" width="24" height="24" rx="7" fill="#17221c" stroke="#1e2b23"/>
      <rect x="19" y="13" width="5" height="5" fill="#22b88c"/>
      <rect x="30" y="13" width="5" height="5" fill="#22b88c"/>
      <rect x="19" y="24" width="5" height="5" fill="#22b88c"/>
      <text x="46" y="20" fill="#8993ac" font-size="10.5" font-weight="bold">QR Code</text>
      <text x="46" y="31" fill="#485065" font-size="8">generate QR codes</text>
    </g>

    <!-- show more button -->
    <rect x="14" y="336" width="202" height="26" rx="9" fill="none" stroke="#1e2b23" stroke-dasharray="3 3"/>
    <text x="105" y="353" fill="#485065" font-size="9" text-anchor="middle">Show 8 more ⌄</text>

    <!-- sidebar footer -->
    <line x1="0" y1="430" x2="230" y2="430" stroke="#141d18" stroke-width="1"/>
    <rect x="14" y="442" width="202" height="30" rx="9" fill="#121b16" stroke="#1e2b23"/>
    <text x="115" y="461" fill="#8993ac" font-size="9.5" text-anchor="middle">🗑 Clear conversation</text>
    <text x="115" y="498" fill="#485065" font-size="9" text-anchor="middle">🐙 Ayush Gupta</text>

    <!-- ============ CHAT PANEL ============ -->

    <!-- chat header -->
    <rect x="230" y="0" width="730" height="50" fill="#0c1310"/>
    <line x1="230" y1="50" x2="960" y2="50" stroke="#141d18" stroke-width="1"/>
    <text x="254" y="23" fill="#eef1f8" font-size="14" font-weight="bold">Chat</text>
    <text x="254" y="37" fill="#485065" font-size="9">talk to the agent — it'll pick a tool when it needs one</text>
    <circle cx="852" cy="25" r="4" fill="#5fd98a">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="862" y="29" fill="#5fd98a" font-size="9">server connected</text>

    <!-- MESSAGE 1: user "hi" -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.05;0.08;0.95;1" dur="9s" repeatCount="indefinite"/>
      <text x="890" y="82" fill="#485065" font-size="8" text-anchor="end">YOU</text>
      <rect x="830" y="90" width="60" height="30" rx="10" fill="#16302a" stroke="#22412f"/>
      <text x="860" y="109" fill="#eef1f8" font-size="12" text-anchor="middle">hi</text>
    </g>

    <!-- MESSAGE 2: agent hello -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.13;0.16;0.95;1" dur="9s" repeatCount="indefinite"/>
      <text x="270" y="144" fill="#485065" font-size="8" text-anchor="start">AGENT</text>
      <rect x="270" y="152" width="290" height="30" rx="10" fill="#121b16" stroke="#1e2b23"/>
      <text x="285" y="171" fill="#eef1f8" font-size="12">Hello, how can I help you today?</text>
    </g>

    <!-- MESSAGE 3: user "Convert 100 USD to INR" -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.27;0.30;0.95;1" dur="9s" repeatCount="indefinite"/>
      <text x="890" y="206" fill="#485065" font-size="8" text-anchor="end">YOU</text>
      <rect x="660" y="214" width="230" height="30" rx="10" fill="#16302a" stroke="#22412f"/>
      <text x="775" y="233" fill="#eef1f8" font-size="12" text-anchor="middle">Convert 100 USD to INR</text>
    </g>

    <!-- typing dots -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.37;0.40;0.47;0.50;1" dur="9s" repeatCount="indefinite"/>
      <text x="270" y="266" fill="#485065" font-size="8" text-anchor="start">AGENT</text>
      <rect x="270" y="274" width="56" height="26" rx="10" fill="#121b16" stroke="#1e2b23"/>
      <circle cx="288" cy="287" r="2.5" fill="#22b88c">
        <animate attributeName="cy" values="287;282;287" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="298" cy="287" r="2.5" fill="#22b88c">
        <animate attributeName="cy" values="287;282;287" dur="1s" begin="0.15s" repeatCount="indefinite"/>
      </circle>
      <circle cx="308" cy="287" r="2.5" fill="#22b88c">
        <animate attributeName="cy" values="287;282;287" dur="1s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- MESSAGE 4: agent final answer with tool badge -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.53;0.95;1" dur="9s" repeatCount="indefinite"/>
      <text x="270" y="266" fill="#485065" font-size="8" text-anchor="start">AGENT</text>
      <rect x="316" y="257" width="120" height="15" rx="8" fill="#0f3d2d" stroke="#3dffc0" stroke-opacity="0.3"/>
      <text x="326" y="268" fill="#3dffc0" font-size="8">$ Currency Converter</text>
      <rect x="270" y="274" width="300" height="60" rx="10" fill="#121b16" stroke="#1e2b23"/>
      <text x="285" y="296" fill="#eef1f8" font-size="12">100 USD = 8,320.45 INR</text>
      <text x="285" y="314" fill="#8993ac" font-size="10.5">(up 12.10, 0.15% from previous close)</text>
    </g>

    <!-- input bar -->
    <rect x="254" y="466" width="682" height="34" rx="12" fill="#0c1310" stroke="#1e2b23"/>
    <text x="270" y="487" fill="#485065" font-size="11">Type your message...</text>
    <circle cx="915" cy="483" r="12" fill="#3dffc0"/>
    <path d="M910 483 L920 478 L917 483 L920 488 Z" fill="#05070a"/>

  </g>
</svg>
